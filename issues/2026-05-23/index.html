          <div class="insight">${paper.analysis.core_insight}</div>
          <div class="actions">
            <button class="toggle">展开深读</button>
            ${paper.url ? `<a class="link" href="${paper.url}" target="_blank" rel="noreferrer">原文</a>` : ""}
            ${paper.pdf_url ? `<a class="link" href="${paper.pdf_url}" target="_blank" rel="noreferrer">PDF</a>` : ""}
          </div>
          <div class="details">
            <div class="detail-layout">
              <aside class="figure-panel">
                ${paper.key_figure_path ? `
                  <figure class="key-figure">
                    <div class="figure-label"><span>Key Figure</span><span>用于快速抓核心机制</span></div>
                    <img src="${paper.key_figure_path}" alt="key figure">
                    <figcaption>${paper.key_figure_caption || "关键图"}</figcaption>
                  </figure>
                ` : `
                  <div class="no-figure">暂无可抽取关键图<br>通常是正式出版页面未开放 PDF 或文本层不可检索。</div>
                `}
              </aside>
              <div class="analysis-panel">
                <div class="detail-block"><strong>问题重述：</strong>${paper.analysis.problem_frame}</div>
                <div class="detail-block"><strong>第一性原理：</strong>${paper.analysis.first_principles}</div>
                <div class="detail-block"><strong>生效机制：</strong>${paper.analysis.mechanism}</div>
                <div class="detail-block"><strong>推进的边界：</strong>${paper.analysis.boundary_advanced}</div>
                <div class="detail-block"><strong>解决的老问题：</strong>${paper.analysis.old_problem}</div>
                <div class="detail-block"><strong>为什么成立：</strong>${paper.analysis.why_it_works}</div>
                <div class="detail-block"><strong>真正新意：</strong>${paper.analysis.true_novelty}</div>
                <div class="detail-block"><strong>证据：</strong>${paper.analysis.evidence_summary}</div>
              </div>
            </div>
          </div>
        </article>
      `).join("");
      gridEl.querySelectorAll(".toggle").forEach(button => {
        button.addEventListener("click", () => {
          const details = button.closest(".card").querySelector(".details");
          details.classList.toggle("open");
          button.textContent = details.classList.contains("open") ? "收起" : "展开深读";
        });
      });
    }

    renderFilters();
    renderCards();
  </script>
</body>
</html>
